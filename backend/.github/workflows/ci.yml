# ============================================================
# .github/workflows/ci.yml
#
# WHY: Continuous Integration catches bugs before they reach main.
#      Every push and PR triggers: install → lint → test → verify build.
#
# HOW: GitHub Actions runs this on every push to main/develop
#      and on every pull request targeting those branches.
#
# Jobs:
#   test    — unit + integration tests
#   build   — verify Docker image builds successfully
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs when a new commit is pushed to the same branch
# This saves CI minutes by not running stale builds
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ============================================================
  # Job 1: Run Tests
  # ============================================================
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    # Test on the current LTS and the previous LTS
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Cache npm dependencies — significantly speeds up subsequent runs
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_for_ci_only
          ANTHROPIC_API_KEY: sk-ant-test-key
          DB_HOST: localhost
          REDIS_HOST: localhost

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_for_ci_only
          ANTHROPIC_API_KEY: sk-ant-test-key
          DB_HOST: localhost
          REDIS_HOST: localhost

      - name: Upload test coverage
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ============================================================
  # Job 2: Verify Docker Build
  # ============================================================
  build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: test  # Only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify it compiles)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false         # Don't push to registry — just verify it builds
          target: production
          tags: leetcode-mcp:ci-test
          # Use GitHub Actions cache to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 3: Security Audit
  # ============================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run npm audit
        # --audit-level=high: only fail on high/critical vulnerabilities
        # Don't fail the build for moderate issues in dev dependencies
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true  # Report but don't block PRs on audit failures
